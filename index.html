<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>愛の不時着 QR受付</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #e879f9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 1.5rem; }
    .sub { color: var(--muted); font-size: 0.95rem; margin: 0; }
    .camera-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16 / 9;
      min-height: 360px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    video, canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { display: none; }
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid rgba(232,121,249,.65);
      border-radius: 16px;
      box-shadow: inset 0 0 0 9999px rgba(0,0,0,.18);
    }
    .scan-line {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 2.2s ease-in-out infinite;
    }
    @keyframes scan {
      0%, 100% { top: 15%; opacity: .3; }
      50% { top: 85%; opacity: 1; }
    }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #334155;
      color: var(--text);
    }
    button.primary { background: linear-gradient(135deg, #a855f7, #ec4899); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #1e293b;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .result {
      border-radius: 16px;
      padding: 20px;
      background: rgba(17,24,39,.9);
      border: 1px solid #334155;
      min-height: 120px;
    }
    .result.ok { border-color: rgba(22,163,74,.6); background: rgba(22,163,74,.12); }
    .result.warn { border-color: rgba(202,138,4,.6); background: rgba(202,138,4,.12); }
    .result.err { border-color: rgba(220,38,38,.6); background: rgba(220,38,38,.12); }
    .status-label { font-size: 1.6rem; font-weight: 700; margin: 0 0 8px; }
    .guest { margin: 0; line-height: 1.7; font-size: 1.1rem; }
    .code { color: var(--muted); font-size: 0.9rem; word-break: break-all; margin-top: 8px; }
    .error { color: #fecaca; font-size: 0.95rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>愛の不時着 QR受付</h1>
      <p class="sub">PCのWebカメラまたはタブレットでQRコードを読み取ります</p>
    </header>

    <div class="camera-wrap">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="canvas"></canvas>
      <div class="overlay"></div>
      <div class="scan-line"></div>
    </div>

    <div class="toolbar">
      <button id="startBtn" class="primary">カメラ開始</button>
      <button id="switchBtn" hidden>カメラ切替</button>
      <button id="reloadConfigBtn">設定再読込</button>
      <span id="apiStatus" class="status-pill">API: 未接続</span>
    </div>

    <section id="result" class="result">
      <p class="sub">「カメラ開始」を押してください。初回はカメラの使用を許可してください。</p>
    </section>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwVZJvl71WcQEMvkJbYYr2tP9mgTFjJ4uP-7yDE6fwO5asuIOMBs2yIK5ZouGTrLJsI/exec';
    const JSQR_URL = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    const IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    const state = {
      config: null,
      stream: null,
      devices: [],
      deviceIndex: 0,
      scanning: false,
      lastCode: '',
      lastAt: 0,
      audioCtx: null,
    };

    const els = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      result: document.getElementById('result'),
      startBtn: document.getElementById('startBtn'),
      switchBtn: document.getElementById('switchBtn'),
      reloadConfigBtn: document.getElementById('reloadConfigBtn'),
      apiStatus: document.getElementById('apiStatus'),
    };

    function ensureAudio() {
      if (!state.audioCtx) {
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (state.audioCtx.state === 'suspended') {
        state.audioCtx.resume();
      }
      return state.audioCtx;
    }

    function playShararan() {
      const ctx = ensureAudio();
      const t0 = ctx.currentTime;
      const melody = [523.25, 659.25, 783.99, 1046.5, 1318.51];
      melody.forEach((freq, i) => {
        const start = t0 + i * 0.06;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = i < melody.length - 1 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.18, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.45);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.5);
      });
      [2093, 2637].forEach((freq, i) => {
        const start = t0 + 0.18 + i * 0.05;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.06, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.22);
      });
    }

    function playShortBeep() {
      const ctx = ensureAudio();
      const t0 = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.12, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.22);
    }

    function setApiStatus(text, ok) {
      els.apiStatus.textContent = 'API: ' + text;
      els.apiStatus.style.color = ok ? '#86efac' : '#fca5a5';
    }

    async function gasFetch(params) {
      const url = new URL(GAS_API_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { redirect: 'follow', mode: 'cors' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'API error');
      return data;
    }

    async function loadConfig() {
      const data = await gasFetch({ action: 'config' });
      state.config = data.config;
      const jsQrUrl = (state.config && state.config.jsQrUrl) || JSQR_URL;
      els.switchBtn.hidden = !(state.config && state.config.showCameraSwitch);
      await loadJsQr(jsQrUrl);
      setApiStatus('接続OK', true);
      return state.config;
    }

    function loadJsQr(url) {
      if (window.jsQR) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.onload = resolve;
        script.onerror = () => reject(new Error('jsQRの読み込みに失敗しました'));
        document.head.appendChild(script);
      });
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('このブラウザはカメラに対応していません（Chrome推奨）');
      }
      stopCamera();

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: IS_MOBILE ? { ideal: 'environment' } : undefined,
          },
          audio: false,
        });
      } catch (err) {
        throw new Error('カメラを起動できませんでした。ブラウザのカメラ許可を確認してください。\n' + err);
      }

      const devices = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === 'videoinput');
      state.devices = devices.length ? devices : [{ deviceId: '' }];
      if (state.devices.length > 1) els.switchBtn.hidden = false;

      state.stream = stream;
      els.video.srcObject = stream;
      await els.video.play();
      state.scanning = true;
      els.startBtn.textContent = 'スキャン中';
      requestAnimationFrame(scanLoop);
    }

    async function startCameraDevice() {
      stopCamera();
      const device = state.devices[state.deviceIndex] || state.devices[0];
      const constraints = {
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      };
      if (device && device.deviceId) {
        constraints.video.deviceId = { exact: device.deviceId };
      } else if (IS_MOBILE) {
        constraints.video.facingMode = { ideal: 'environment' };
      }
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      state.stream = stream;
      els.video.srcObject = stream;
      await els.video.play();
      state.scanning = true;
      requestAnimationFrame(scanLoop);
    }

    function stopCamera() {
      state.scanning = false;
      if (state.stream) {
        state.stream.getTracks().forEach((t) => t.stop());
        state.stream = null;
      }
    }

    function renderResult(payload) {
      const box = els.result;
      box.className = 'result';
      if (!payload || payload.status === 'error') {
        box.classList.add('err');
        box.innerHTML = '<p class="status-label">エラー</p><p class="error">' + escapeHtml((payload && payload.message) || '不明なエラー') + '</p>';
        return;
      }
      if (payload.status === 'scanned') box.classList.add('ok');
      else if (payload.status === 'alreadyScanned') box.classList.add('warn');
      else box.classList.add('err');

      const guest = payload.guest || {};
      const lines = [];
      if (payload.status === 'scanned') lines.push('<p class="status-label">' + escapeHtml(payload.message1 || 'OK') + '</p>');
      if (payload.status === 'alreadyScanned') lines.push('<p class="status-label">' + escapeHtml(payload.message1 || '') + '</p><p>' + escapeHtml(payload.message2 || '') + '</p>');
      if (payload.status === 'notFound') lines.push('<p class="status-label">' + escapeHtml(payload.message1 || '') + '</p><p>' + escapeHtml(payload.message2 || '') + '</p>');
      if (guest['氏名']) {
        const tableNo = guest['テーブル番号'] || guest['座席番号'] || '';
        const detail = tableNo ? 'テーブル ' + tableNo : (guest['所属'] || '');
        lines.push('<p class="guest"><strong>' + escapeHtml(guest['氏名']) + '</strong> 様<br>' + escapeHtml(detail) + '</p>');
      }
      if (state.config && state.config.showScannedCode) lines.push('<p class="code">' + escapeHtml(payload.code || '') + '</p>');
      box.innerHTML = lines.join('');

      if (payload.status === 'scanned') playShararan();
      else if (payload.status === 'alreadyScanned') playShortBeep();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function submitScan(code) {
      const now = Date.now();
      if (code === state.lastCode && now - state.lastAt < 2500) return;
      state.lastCode = code;
      state.lastAt = now;
      try {
        const data = await gasFetch({ action: 'scan', code });
        renderResult(data);
      } catch (err) {
        renderResult({ status: 'error', message: String(err) });
      }
    }

    function scanLoop() {
      if (!state.scanning) return;
      const video = els.video;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const canvas = els.canvas;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const found = window.jsQR && window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
        if (found && found.data) submitScan(found.data);
      }
      requestAnimationFrame(scanLoop);
    }

    els.startBtn.addEventListener('click', async () => {
      try {
        ensureAudio();
        renderResult({ status: 'error', message: 'カメラを起動しています…' });
        const configPromise = loadConfig().catch((err) => {
          setApiStatus('接続失敗', false);
          throw new Error('API接続エラー: ' + err + '\nGASのデプロイURLを確認してください。');
        });
        const cameraPromise = startCamera();
        await Promise.all([configPromise, cameraPromise]);
        renderResult({ status: 'scanned', message1: 'カメラ起動完了。QRをかざしてください。', guest: {}, code: '' });
      } catch (err) {
        renderResult({ status: 'error', message: String(err) });
        els.startBtn.textContent = 'カメラ開始';
      }
    });

    els.switchBtn.addEventListener('click', async () => {
      if (!state.devices.length) return;
      state.deviceIndex = (state.deviceIndex + 1) % state.devices.length;
      try {
        await startCameraDevice();
      } catch (err) {
        renderResult({ status: 'error', message: String(err) });
      }
    });

    els.reloadConfigBtn.addEventListener('click', async () => {
      try {
        await loadConfig();
        renderResult({ status: 'scanned', message1: '設定を再読込しました', guest: {}, code: '' });
      } catch (err) {
        renderResult({ status: 'error', message: String(err) });
      }
    });

    window.addEventListener('beforeunload', stopCamera);
  </script>
</body>
</html>
